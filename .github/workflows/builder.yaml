name: Build and Publish ESPHome Builder Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Determine ESPHome Ref
        id: esphome_ref
        run: |
          REF=$(yq eval '.esphome_ref // "dev"' ./esphome-smhub/build.yaml)
          echo "Using ESPHome ref: $REF"
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Checkout custom ESPHome fork
        uses: actions/checkout@v6
        with:
          repository: smlight-smhub/esphome
          ref: ${{ steps.esphome_ref.outputs.ref }}
          token: ${{ secrets.GH_TOKEN }}
          path: esphome-smhub/esphome-src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Target Configurations
        id: config
        run: |
          RELEASE_VER="2026.5.3-1"

          # Read base image directly from build.yaml
          BASE_IMAGE=$(yq eval '.build_from.${{ matrix.arch }}' ./esphome-smhub/build.yaml)
          echo "Selected Base Image: $BASE_IMAGE"
          echo "base_image=$BASE_IMAGE" >> $GITHUB_OUTPUT

          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "platform=linux/amd64" >> $GITHUB_OUTPUT
          else
            echo "platform=linux/arm64" >> $GITHUB_OUTPUT
          fi

          echo "tag_release=ghcr.io/${{ github.repository_owner }}/esphome-smhub-${{ matrix.arch }}:${RELEASE_VER}" >> $GITHUB_OUTPUT
          echo "tag_latest=ghcr.io/${{ github.repository_owner }}/esphome-smhub-${{ matrix.arch }}:latest" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./esphome-smhub
          file: ./esphome-smhub/Dockerfile
          platforms: ${{ steps.config.outputs.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ steps.config.outputs.base_image }}
          secrets: |
            "GH_TOKEN=${{ secrets.GH_TOKEN }}"
          tags: |
            ${{ steps.config.outputs.tag_release }}
            ${{ steps.config.outputs.tag_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compile:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-24.04
          - arch: aarch64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    container:
      image: ghcr.io/${{ github.repository_owner }}/esphome-smhub-${{ matrix.arch }}:latest
      env:
        PLATFORMIO_CORE_DIR: /opt/platformio
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure Git Authentication
        run: |
          git config --global url."https://${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Compile smhub-esphome
        run: |
          esphome compile esphome-smhub/smhub-esphome.yaml

      - name: Compile nano-esphome
        run: |
          esphome compile esphome-smhub/nano-esphome.yaml

      - name: Prepare Artifacts
        run: |
          mkdir -p output

          # Copy SMHUB firmware
          SMHUB_PIO="esphome-smhub/.esphome/build/rtos-smhub/.pioenvs/rtos-smhub"
          if [ -d "$SMHUB_PIO" ]; then
            cp "$SMHUB_PIO/program.elf" output/smhub-rtos.elf || true
            cp "$SMHUB_PIO/program_debug.elf" output/smhub-rtos_debug.elf || true
            cp "$SMHUB_PIO/program.bin" output/smhub-rtos.bin || true
          fi

          # Copy NANO firmware
          NANO_PIO="esphome-smhub/.esphome/build/rtos-nano/.pioenvs/rtos-nano"
          if [ -d "$NANO_PIO" ]; then
            cp "$NANO_PIO/program.elf" output/nano-rtos.elf || true
            cp "$NANO_PIO/program_debug.elf" output/nano-rtos_debug.elf || true
            cp "$NANO_PIO/program.bin" output/nano-rtos.bin || true
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: smhub-rtos-binaries-${{ matrix.arch }}
          path: output/
          if-no-files-found: error
