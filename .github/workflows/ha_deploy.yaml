name: Build and Publish Home Assistant Addon

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          submodules: recursive

      - name: Determine ESPHome Ref
        id: esphome_ref
        run: |
          REF=$(yq eval '.esphome_ref // "dev"' ./esphome-smhub/build.yaml)
          echo "Using ESPHome ref: $REF"
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Checkout custom ESPHome fork
        uses: actions/checkout@v6
        with:
          repository: smlight-smhub/esphome
          ref: ${{ steps.esphome_ref.outputs.ref }}
          token: ${{ secrets.GH_TOKEN }}
          path: esphome-smhub/esphome-src

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Target Configurations
        id: config
        run: |
          # Read version dynamically from config.yaml
          VERSION=$(yq eval '.version' ./esphome-smhub/config.yaml)
          echo "Addon Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Read base image directly from build.yaml
          BASE_IMAGE=$(yq eval '.build_from.${{ matrix.arch }}' ./esphome-smhub/build.yaml)
          echo "Selected Base Image: $BASE_IMAGE"
          echo "base_image=$BASE_IMAGE" >> $GITHUB_OUTPUT
          
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "platform=linux/amd64" >> $GITHUB_OUTPUT
          else
            echo "platform=linux/arm64" >> $GITHUB_OUTPUT
          fi
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.number }}"
            echo "tags=ghcr.io/${{ github.repository_owner }}/esphome-smhub-${{ matrix.arch }}:${TAG}" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/${{ github.repository_owner }}/esphome-smhub-${{ matrix.arch }}:${VERSION},ghcr.io/${{ github.repository_owner }}/esphome-smhub-${{ matrix.arch }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./esphome-smhub
          file: ./esphome-smhub/Dockerfile
          platforms: ${{ steps.config.outputs.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_FROM=${{ steps.config.outputs.base_image }}
          secrets: |
            "GH_TOKEN=${{ secrets.GH_TOKEN }}"
          tags: ${{ steps.config.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
