name: Build and Publish Home Assistant Addon

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      compile_image: ${{ steps.config.outputs.tag_ci }}
    env:
      # GitHub org/user that owns GHCR packages
      GH_OWNER: ${{ github.repository_owner }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          submodules: false
      - name: Install Build Tools
        run: |
          if ! command -v yq >/dev/null 2>&1; then
            if [ "${{ matrix.arch }}" = "aarch64" ]; then
              YQ_ARCH="arm64"
            else
              YQ_ARCH="amd64"
            fi
            sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${YQ_ARCH}"
            sudo chmod +x /usr/local/bin/yq
          fi

          git --version
          yq --version
          docker --version

      - name: Checkout rtos-config
        run: |
          CONFIG_DIR="$GITHUB_WORKSPACE/esphome-smhub/config"
          rm -rf "$CONFIG_DIR"
          git clone --depth 1 https://github.com/smlight-smhub/rtos-config.git "$CONFIG_DIR"

      - name: Determine ESPHome Ref
        id: esphome_ref
        run: |
          # Read ESPHOME_REF from args in build.yaml
          REF=$(yq -r '.args.ESPHOME_REF' "$GITHUB_WORKSPACE/esphome-smhub/build.yaml")
          if [ "$REF" = "null" ] || [ -z "$REF" ]; then
            case "$GITHUB_REF" in
              refs/tags/*) REF="release" ;;
              *) REF="dev" ;;
            esac
          fi
          echo "Using ESPHome ref: $REF"
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Version on Tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          yq -i ".version = \"$TAG_VERSION\"" "$GITHUB_WORKSPACE/esphome-smhub/config.yaml"
          
          # Commit and push the updated config.yaml back to the main branch
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "$GITHUB_WORKSPACE/esphome-smhub/config.yaml"
          # Only commit and push if there are changes
          if git diff --staged --quiet; then
            echo "Version already up to date"
          else
            git commit -m "chore: bump version to $TAG_VERSION [skip ci]"
            # Push to the main branch
            git push origin HEAD:main
          fi

      - name: Determine Target Configurations
        id: config
        run: |
          # Read version dynamically from config.yaml
          VERSION=$(yq -r '.version' "$GITHUB_WORKSPACE/esphome-smhub/config.yaml")
          echo "Addon Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Read base image directly from build.yaml
          BASE_IMAGE=$(yq -r '.build_from.${{ matrix.arch }}' "$GITHUB_WORKSPACE/esphome-smhub/build.yaml")
          echo "Selected Base Image: $BASE_IMAGE"
          echo "base_image=$BASE_IMAGE" >> $GITHUB_OUTPUT

          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "platform=linux/amd64" >> $GITHUB_OUTPUT
          else
            echo "platform=linux/arm64" >> $GITHUB_OUTPUT
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.number }}"
            TAGS="ghcr.io/${{ env.GH_OWNER }}/esphome-smhub-${{ matrix.arch }}:${TAG}"
          else
            TAGS="ghcr.io/${{ env.GH_OWNER }}/esphome-smhub-${{ matrix.arch }}:${VERSION},ghcr.io/${{ env.GH_OWNER }}/esphome-smhub-${{ matrix.arch }}:latest"
          fi
          
          TAG_CI="ghcr.io/${{ env.GH_OWNER }}/esphome-smhub-amd64:${{ github.sha }}"
          echo "tag_ci=$TAG_CI" >> "$GITHUB_OUTPUT"
          
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "tags_to_push=${TAGS},${TAG_CI}" >> $GITHUB_OUTPUT
          else
            echo "tags_to_push=${TAGS}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./esphome-smhub
          file: ./esphome-smhub/Dockerfile
          platforms: ${{ steps.config.outputs.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ steps.config.outputs.base_image }}
            ESPHOME_REF=${{ steps.esphome_ref.outputs.ref }}
            DEVICE_BUILDER_REF=main
          tags: ${{ steps.config.outputs.tags_to_push }}

  compile:
    needs: publish
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.publish.outputs.compile_image }}
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
      env:
        PLATFORMIO_CORE_DIR: /opt/platformio
    steps:


      - name: Compile smhub-esphome
        run: |
          esphome compile /opt/smhub-esphome.yaml

      - name: Compile nano-esphome
        run: |
          esphome compile /opt/nano-esphome.yaml

      - name: Prepare Artifacts
        run: |
          mkdir -p output

          # Copy SMHUB firmware
          SMHUB_PIO="/opt/.esphome/build/rtos-smhub/.pioenvs/rtos-smhub"
          if [ -d "$SMHUB_PIO" ]; then
            cp "$SMHUB_PIO/program.elf" output/smhub-rtos.elf || true
            cp "$SMHUB_PIO/program_debug.elf" output/smhub-rtos_debug.elf || true
            cp "$SMHUB_PIO/program.bin" output/smhub-rtos.bin || true
          fi

          # Copy NANO firmware
          NANO_PIO="/opt/.esphome/build/rtos-nano/.pioenvs/rtos-nano"
          if [ -d "$NANO_PIO" ]; then
            cp "$NANO_PIO/program.elf" output/nano-rtos.elf || true
            cp "$NANO_PIO/program_debug.elf" output/nano-rtos_debug.elf || true
            cp "$NANO_PIO/program.bin" output/nano-rtos.bin || true
          fi

      - name: Install Node.js
        run: |
          if command -v node >/dev/null 2>&1; then
            node --version
            exit 0
          fi

          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y nodejs npm
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache nodejs npm
          else
            echo "Unable to install Node.js automatically on this container"
            exit 1
          fi

          node --version

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: smhub-rtos-binaries-amd64
          path: output/
          if-no-files-found: error
